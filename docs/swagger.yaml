            $ref: '#/definitions/github_com_Zakhar4uk_golang-app_internal_core_transport_http_response.ErrorResponse'
      summary: Получение пользователя
      tags:
      - users
  /users/id:
    patch:
      consumes:
      - application/json
      description: Измненение информации о уже существующем пользователе
      parameters:
      - description: ID изменяемого пользователя
        in: path
        name: id
        required: true
        type: integer
      - description: PatchUser тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_users_transport_http.PatchUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешное измненение
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.PatchUserRequest'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Zakhar4uk_golang-app_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_Zakhar4uk_golang-app_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_Zakhar4uk_golang-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Zakhar4uk_golang-app_internal_core_transport_http_response.ErrorResponse'
      summary: Измненение пользователя
      tags:
      - users
